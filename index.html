                <section className="py-20 bg-white">
                    <div className="container mx-auto px-6 max-w-3xl">
                        <SectionTitle title="Pertanyaan Umum" />
                        <div className="space-y-4">
                            {FAQ_DATA.map((item, idx) => (
                                <div key={idx} className="border border-gray-100 rounded-xl overflow-hidden">
                                    <button 
                                        className="w-full flex justify-between items-center p-5 bg-gray-50 hover:bg-gray-100 transition-colors text-left font-semibold text-primary"
                                        onClick={() => toggle(idx)}
                                    >
                                        {item.q}
                                        <span className={`transform transition-transform duration-300 ${openIndex === idx ? 'rotate-180' : ''}`}>
                                            <ChevronRight />
                                        </span>
                                    </button>
                                    <AnimatePresence>
                                        {openIndex === idx && (
                                            <motion.div 
                                                initial={{ height: 0, opacity: 0 }}
                                                animate={{ height: "auto", opacity: 1 }}
                                                exit={{ height: 0, opacity: 0 }}
                                                className="px-5 overflow-hidden"
                                            >
                                                <p className="py-5 text-gray-600 border-t border-gray-100">{item.a}</p>
                                            </motion.div>
                                        )}
                                    </AnimatePresence>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Contact = () => {
            const [formState, setFormState] = useState({ name: '', email: '', wa: '', message: '' });
            const [showToast, setShowToast] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                // Simulate API call / Mailto
                const mailtoLink = `mailto:halo@ruangdigital.com?subject=Konsultasi dari ${formState.name}&body=Nama: ${formState.name}%0AEmail: ${formState.email}%0AWA: ${formState.wa}%0APesan: ${formState.message}`;
                window.location.href = mailtoLink;
                
                setShowToast(true);
                setTimeout(() => setShowToast(false), 3000);
                setFormState({ name: '', email: '', wa: '', message: '' });
            };

            return (
                <section id="kontak" className="py-20 bg-primary text-white relative overflow-hidden">
                    {/* Background decoration */}
                    <div className="absolute top-0 right-0 w-64 h-64 bg-accent/10 rounded-full blur-3xl translate-x-1/2 -translate-y-1/2"></div>
                    
                    <div className="container mx-auto px-6 relative z-10">
                        <div className="flex flex-col lg:flex-row gap-12">
                            <div className="lg:w-1/2">
                                <h2 className="text-3xl md:text-4xl font-bold mb-6">Siap Punya Produk Digital & Website Sendiri?</h2>
                                <p className="text-primary-100 text-lg mb-8">Book call 15 menit gratis. Kita bedah bisnis kamu + kasih roadmap.</p>
                                
                                <div className="space-y-6">
                                    <a href="https://wa.me/6281234567890" target="_blank" className="flex items-center gap-4 group">
                                        <div className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center group-hover:bg-accent transition-colors">
                                            <Phone size={24} />
                                        </div>
                                        <div>
                                            <p className="text-sm text-primary-200">WhatsApp</p>
                                            <p className="font-bold">+62 812-3456-7890</p>
                                        </div>
                                    </a>
                                    <a href="#" className="flex items-center gap-4 group">
                                        <div className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center group-hover:bg-accent transition-colors">
                                            <Mail size={24} />
                                        </div>
                                        <div>
                                            <p className="text-sm text-primary-200">Email</p>
                                            <p className="font-bold">halo@ruangdigital.com</p>
                                        </div>
                                    </a>
                                </div>
                            </div>

                            <div className="lg:w-1/2 bg-white text-dark rounded-xl p-8 shadow-2xl">
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                                        <input 
                                            required
                                            type="text" 
                                            className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                                            placeholder="Nama Anda"
                                            value={formState.name}
                                            onChange={e => setFormState({...formState, name: e.target.value})}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                        <input 
                                            required
                                            type="email" 
                                            className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                                            placeholder="email@anda.com"
                                            value={formState.email}
                                            onChange={e => setFormState({...formState, email: e.target.value})}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">No. WhatsApp</label>
                                        <input 
                                            required
                                            type="tel" 
                                            className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                                            placeholder="0812..."
                                            value={formState.wa}
                                            onChange={e => setFormState({...formState, wa: e.target.value})}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Pesan / Kebutuhan</label>
                                        <textarea 
                                            required
                                            rows="3"
                                            className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                                            placeholder="Ceritakan sedikit tentang bisnis Anda..."
                                            value={formState.message}
                                            onChange={e => setFormState({...formState, message: e.target.value})}
                                        ></textarea>
                                    </div>
                                    <Button type="submit" className="w-full">
                                        Kirim Pesan <Send size={16} className="ml-2"/>
                                    </Button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <Toast show={showToast} message="Pesan terkirim! Mengalihkan ke email..." />
                </section>
            );
        };

        const Footer = () => (
            <footer className="bg-dark text-white py-12 border-t border-gray-800">
                <div className="container mx-auto px-6">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-8">
                        <div className="text-2xl font-bold flex items-center gap-2 mb-4 md:mb-0">
                            <Globe size={24} className="text-primary"/> Ruang Digital
                        </div>
                        <div className="flex gap-4">
                            <a href="#" className="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center hover:bg-primary transition-colors">
                                <Instagram size={20} />
                            </a>
                            <a href="#" className="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center hover:bg-primary transition-colors">
                                <Linkedin size={20} />
                            </a>
                        </div>
                    </div>
                    <div className="border-t border-gray-800 pt-8 text-center text-gray-500 text-sm">
                        &copy; 2026 Ruang Digital Studio. All rights reserved.
                    </div>
                </div>
            </footer>
        );

        const App = () => {
            return (
                <div className="min-h-screen">
                    <Navbar />
                    <main>
                        <Hero />
                        <PainPoints />
                        <Services />
                        <Process />
                        <Portfolio />
                        <Pricing />
                        <Testimonials />
                        <FAQ />
                        <Contact />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
